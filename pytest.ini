[pytest]
# Test discovery and execution
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async test support
asyncio_mode = auto

# Timeout untuk mencegah hanging tests
timeout = 300
timeout_method = thread

# Markers untuk test classification
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    gpu: marks tests as GPU-related
    layer0: Layer 0 tests
    layer1: Layer 1 tests
    layer2: Layer 2 tests
    layer3: Layer 3 tests
    layer4: Layer 4 tests
    layer5: Layer 5 tests
    layer6: Layer 6 tests (GPU acceleration)
    layer7: Layer 7 tests
    layer8: Layer 8 tests

# Output options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options
[coverage:run]
branch = True
source = .
omit =
    test_*.py
    *_test.py
    .venv/*
    build/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if 0:
    if False:
