name: Safe Change Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-safe-change:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install pytest
        run: python -m pip install --upgrade pip && pip install pytest

      - name: Run safe-change checker
        run: python tools/check_safe_change.py
